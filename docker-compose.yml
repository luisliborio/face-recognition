services:
  database:
    image: postgres:13-alpine
    container_name: db_face_recognition
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: face_recognition_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend-api:
    build: ./backend-api
    container_name: api_face_recognition
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api/app:/app/app
      - ./backend-api/model.keras:/app/model.keras
    environment:
      DATABASE_URL: "postgresql://user:password@database/face_recognition_db"
    depends_on:
      - database
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend_face_recognition
    ports:
      - "8080:80"
    depends_on:
      - backend-api
    restart: unless-stopped

volumes:
  postgres_data: